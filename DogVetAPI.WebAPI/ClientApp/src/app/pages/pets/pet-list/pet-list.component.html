<div class="page-content">
  <div class="page-header">
    <h1>🐕 Mascotas</h1>
    <a routerLink="/pets/new" class="btn btn-primary">+ Nueva Mascota</a>
  </div>

  <div class="card" style="margin-bottom: var(--space-md); display: flex; gap: var(--space-md); flex-wrap: wrap;">
    <input class="form-control" style="flex: 1; min-width: 200px;" [(ngModel)]="search" placeholder="🔍 Buscar por nombre o raza..." />
    <select class="form-control" style="width: 180px;" [(ngModel)]="filterOwner">
      <option value="">Todos los Propietarios</option>
      <option *ngFor="let o of owners" [value]="o.id">{{ o.firstName }} {{ o.lastName }}</option>
    </select>
    <select class="form-control" style="width: 150px;" [(ngModel)]="filterSpecies">
      <option value="">Todas las Especies</option>
      <option *ngFor="let s of species" [value]="s.value">{{ s.value | species }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="spinner-wrap"><div class="spinner"></div><p style="text-align: center; margin-top: var(--space-md); color: var(--color-text-muted);">Cargando mascotas...</p></div>
  <div *ngIf="!loading && error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && !error">
    <div *ngIf="filtered.length === 0" class="empty-state">
      <span class="empty-icon">🐕</span>
      <p>No se encontraron mascotas.</p>
      <a routerLink="/pets/new" class="btn btn-primary" style="margin-top: var(--space-md);">Registrar primera mascota</a>
    </div>

    <div *ngIf="filtered.length > 0" class="card table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th class="hide-mobile">Especie</th>
            <th>Raza</th>
            <th class="hide-mobile">Edad</th>
            <th class="hide-mobile">Peso</th>
            <th class="hide-mobile">Género</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let pet of filtered" (click)="navigateTo(pet.id)" style="cursor:pointer;">
            <td><a [routerLink]="['/pets', pet.id]" style="font-weight:500;" (click)="$event.stopPropagation()">{{ pet.name }}</a></td>
            <td class="hide-mobile">{{ pet.species | species }}</td>
            <td>{{ pet.breed }}</td>
            <td class="hide-mobile">{{ pet.dateOfBirth | age }}</td>
            <td class="hide-mobile">{{ pet.weight }}kg</td>
            <td class="hide-mobile">{{ pet.gender | gender }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

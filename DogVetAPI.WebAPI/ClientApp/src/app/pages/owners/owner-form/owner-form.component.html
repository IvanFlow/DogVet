<div class="page-content">
  <div class="page-header">
    <h1>{{ isEdit ? '✏️ Editar Propietario' : '➕ Nuevo Propietario' }}</h1>
    <a routerLink="/owners" class="btn btn-ghost">← Cancelar</a>
  </div>

  <div class="card" style="max-width: 700px;">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre *</label>
          <input class="form-control" formControlName="firstName" placeholder="Ingrese el nombre..." />
        </div>

        <div class="form-group">
          <label>Apellido *</label>
          <input class="form-control" formControlName="lastName" placeholder="Ingrese el apellido..." />
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Email *</label>
          <input class="form-control" type="email" formControlName="email" placeholder="propietario@ejemplo.com" />
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <input class="form-control" formControlName="phoneNumber" placeholder="+1 (555) 123-4567" />
        </div>

        <div class="form-group">
          <label>Ciudad</label>
          <input class="form-control" formControlName="city" placeholder="Ingrese la ciudad..." />
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Dirección</label>
          <input class="form-control" formControlName="address" placeholder="Ingrese la dirección..." />
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger" style="margin-top: var(--space-md);">{{ error }}</div>

      <div style="display:flex; gap: var(--space-sm); margin-top: var(--space-lg);">
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving">
          {{ saving ? 'Guardando...' : (isEdit ? 'Guardar Cambios' : 'Crear Propietario') }}
        </button>
        <a routerLink="/owners" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>

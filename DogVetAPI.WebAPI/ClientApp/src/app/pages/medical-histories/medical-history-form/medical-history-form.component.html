<div class="page-content">
  <div class="page-header">
    <h1>{{ isEdit ? '✏️ Editar Registro Médico' : '➕ Nuevo Registro Médico' }}</h1>
    <a routerLink="/medical-histories" class="btn btn-ghost">← Cancelar</a>
  </div>

  <div class="card" style="max-width: 700px;">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <!-- Filtro de propietario (no se envía, solo para filtrar mascotas) -->
        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Propietario</label>
          <ng-container *ngIf="lockedPetId; else ownerSelect">
            <input class="form-control" [value]="lockedOwnerName" disabled />
          </ng-container>
          <ng-template #ownerSelect>
            <select class="form-control" [(ngModel)]="selectedOwner" [ngModelOptions]="{standalone: true}" (change)="onOwnerChange()">
              <option value="">— Todos los Propietarios —</option>
              <option *ngFor="let o of owners" [value]="o.id">{{ o.firstName }} {{ o.lastName }}</option>
            </select>
          </ng-template>
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Mascota *</label>
          <ng-container *ngIf="lockedPetId; else petSelect">
            <input class="form-control" [value]="lockedPetName" disabled />
          </ng-container>
          <ng-template #petSelect>
            <select class="form-control" formControlName="petId">
              <option value="">— Seleccionar Mascota —</option>
              <option *ngFor="let p of availablePets" [value]="p.id">{{ p.name }} ({{ p.breed }})</option>
            </select>
          </ng-template>
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Diagnóstico *</label>
          <input class="form-control" formControlName="diagnosis" placeholder="Ingrese el diagnóstico…" />
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Notas</label>
          <textarea class="form-control" formControlName="notes" rows="4" placeholder="Notas adicionales…"></textarea>
        </div>

        <div class="form-group">
          <label>Fecha de Visita *</label>
          <input class="form-control" type="date" formControlName="visitDate" />
        </div>

        <div class="form-group">
          <label>Fecha de Seguimiento</label>
          <input class="form-control" type="date" formControlName="followUpDate" />
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Seguimiento de (Registro Anterior)</label>
          <select class="form-control" formControlName="followUpOf">
            <option value="">— No es un seguimiento —</option>
            <option *ngFor="let r of availableFollowUpRecords" [value]="r.id">
              #{{ r.id }} - {{ r.diagnosis }} ({{ r.visitDate | date:'mediumDate' }})
            </option>
          </select>
          <small style="color: var(--color-text-muted); display: block; margin-top: 4px;">
            Selecciona un registro anterior para marcar este como un seguimiento
          </small>
        </div>

        <div *ngIf="isEdit" class="form-group">
          <label>Estado</label>
          <select class="form-control" formControlName="status">
            <option value="Completed">Completado</option>
            <option value="Pending">Pendiente</option>
            <option value="Follow-up">Seguimiento</option>
          </select>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger" style="margin-top: var(--space-md);">{{ error }}</div>

      <div style="display:flex; gap: var(--space-sm); margin-top: var(--space-lg);">
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving">
          {{ saving ? 'Guardando…' : (isEdit ? 'Guardar Cambios' : 'Crear Registro') }}
        </button>
        <a routerLink="/medical-histories" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
